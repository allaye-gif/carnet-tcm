<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MétéoCarnet Mali</title>
<link rel="icon" type="image/png" href="/logo-mali-meteo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16233B; --ink-soft:#4C596F;
  --bg:#EEEBE2; --surface:#FFFFFF; --surface-2:#F7F4EC;
  --border:#DAD3C0; --border-strong:#C2B89C;
  --sky:#1C6E8C; --sky-deep:#0D4A5C; --sky-pale:#E3EEF1;
  --brass:#B9803A; --brass-pale:#F5E9D4;
  --ok:#3E7A5C; --ok-pale:#E3EFE7;
  --danger:#AF4A3A; --danger-pale:#F6E4E0;
  --radius:10px;
  --font-display:'Fraunces',serif;
  --font-sans:'IBM Plex Sans',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-sans);font-size:14px;line-height:1.5;}
h1,h2,h3{font-family:var(--font-display);font-weight:600;margin:0;color:var(--ink);}
button{font-family:var(--font-sans);cursor:pointer;}
input,select,textarea{font-family:var(--font-mono);font-size:13px;}

#app{max-width:1360px;margin:0 auto;padding:20px 24px 60px;}
.topbar{display:flex;align-items:center;gap:18px;padding:18px 22px;background:var(--sky-deep);border-radius:16px;color:#fff;margin-bottom:18px;}
.topbar .brand{display:flex;align-items:center;gap:14px;flex:1;}
.topbar h1{color:#fff;font-size:22px;letter-spacing:.2px;}
.topbar .sub{font-size:12px;color:#BFD9E1;font-family:var(--font-sans);margin-top:2px;}
.station-picker{display:flex;align-items:center;gap:10px;}
.station-picker select{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:8px;padding:8px 10px;min-width:190px;}
.station-picker select option{color:#111;}
.btn{border:1px solid var(--border-strong);background:var(--surface);border-radius:8px;padding:8px 14px;font-size:13px;color:var(--ink);transition:transform .08s;}
.btn:hover{background:var(--surface-2);}
.btn:active{transform:scale(.97);}
.btn.primary{background:var(--sky);border-color:var(--sky-deep);color:#fff;}
.btn.primary:hover{background:var(--sky-deep);}
.btn.brass{background:var(--brass);border-color:#8f5f26;color:#fff;}
.btn.brass:hover{background:#9c6a2e;}
.btn.ghost{background:transparent;border-color:rgba(255,255,255,.4);color:#fff;}
.btn.ghost:hover{background:rgba(255,255,255,.12);}
.btn.sm{padding:5px 10px;font-size:12px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

.tabs{display:flex;gap:6px;margin-bottom:18px;}
.tab{padding:10px 18px;border-radius:9px 9px 0 0;background:var(--surface-2);border:1px solid var(--border);border-bottom:none;color:var(--ink-soft);font-weight:500;font-size:13.5px;}
.tab.active{background:var(--surface);color:var(--sky-deep);border-color:var(--border-strong);position:relative;top:1px;}

.panel{background:var(--surface);border:1px solid var(--border-strong);border-radius:0 12px 12px 12px;padding:22px;}
.card{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:16px;}
.card h3{font-size:16px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:end;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:11.5px;color:var(--ink-soft);font-family:var(--font-sans);text-transform:uppercase;letter-spacing:.4px;}
.field input,.field select,.field textarea{border:1px solid var(--border-strong);border-radius:7px;padding:7px 9px;background:#fff;color:var(--ink);}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--sky);outline-offset:1px;}
.field input[type=text],.field input[type=number]{width:110px;}

.cachet{width:46px;height:46px;border-radius:50%;border:2px solid #BFD9E1;position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;background:#fff;}
.cachet::before{content:'';position:absolute;inset:4px;border:1px dashed rgba(255,255,255,.55);border-radius:50%;}
.cachet span{font-family:var(--font-display);font-weight:600;font-size:15px;color:#fff;}
.cachet img{width:100%;height:100%;object-fit:cover;border-radius:50%;position:relative;z-index:1;}
.cachet.logo-badge::before{display:none;}
.cachet.stamp-anim{animation:stampdown .45s cubic-bezier(.2,1.6,.4,1);}
@keyframes stampdown{0%{transform:scale(1.8) rotate(-14deg);opacity:0;}60%{transform:scale(.94) rotate(2deg);opacity:1;}100%{transform:scale(1) rotate(0);}}

.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;}
table.grid{border-collapse:collapse;width:100%;font-family:var(--font-mono);font-size:12.5px;}
table.grid th,table.grid td{border:1px solid var(--border);padding:4px 5px;text-align:center;white-space:nowrap;}
table.grid thead th{background:var(--sky-pale);color:var(--sky-deep);font-family:var(--font-sans);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.3px;position:sticky;top:0;z-index:2;}
table.grid td input, table.grid td select{width:100%;min-width:50px;border:none;background:transparent;text-align:center;padding:3px 2px;font-family:var(--font-mono);font-size:12.5px;color:var(--ink);}
table.grid td input:focus, table.grid td select:focus{outline:2px solid var(--sky);border-radius:4px;}
td.triplet-cell{padding:3px 3px;white-space:nowrap;}
td.triplet-cell .triplet-part{width:32px;min-width:32px;display:inline-block;border:1px solid var(--border);border-radius:3px;margin:0 1px;padding:3px 0;text-align:center;background:var(--surface);}
td.triplet-cell .triplet-part:focus{outline:2px solid var(--sky);}
table.grid tr.total-row td{background:var(--brass-pale);font-weight:600;}
table.grid tr:hover td{background:#FBFAF6;}
table.grid tr.total-row:hover td{background:var(--brass-pale);}
table.grid tr.std-hour td.rowhead{background:var(--sky-pale);color:var(--sky-deep);font-weight:600;}
table.grid td.rowhead{background:var(--surface-2);font-family:var(--font-sans);font-weight:500;color:var(--ink-soft);}

.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.metric .label{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-soft);margin-bottom:5px;}
.metric .value{font-family:var(--font-mono);font-size:19px;font-weight:500;color:var(--sky-deep);}
.metric .sub{font-size:11px;color:var(--ink-soft);margin-top:2px;}

.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;background:var(--sky-pale);color:var(--sky-deep);font-size:11.5px;border:1px solid #C9DEE4;cursor:pointer;}
.pill.saved{background:var(--ok-pale);color:var(--ok);border-color:#C7DFCF;}
.pill.missing{background:var(--surface-2);color:var(--ink-soft);border-color:var(--border);}
.calendar-row{display:flex;flex-wrap:wrap;gap:6px;}

.toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;box-shadow:0 6px 20px rgba(0,0,0,.2);z-index:50;display:flex;align-items:center;gap:10px;opacity:0;transform:translateY(8px);transition:all .25s;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.err{background:var(--danger);}

.mode-toggle{display:flex;gap:0;border:1px solid var(--border-strong);border-radius:8px;overflow:hidden;}
.mode-toggle button{border:none;background:var(--surface);padding:8px 16px;font-size:13px;color:var(--ink-soft);}
.mode-toggle button.active{background:var(--sky);color:#fff;}

.scan-drop{border:2px dashed var(--border-strong);border-radius:12px;padding:20px;text-align:center;color:var(--ink-soft);background:var(--surface-2);}
.scan-drop.drag{border-color:var(--sky);background:var(--sky-pale);}
.thumb-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.thumb{width:70px;height:70px;object-fit:cover;border-radius:6px;border:1px solid var(--border-strong);}

textarea.wide{width:100%;min-height:60px;resize:vertical;font-family:var(--font-sans);font-size:13px;}
.help{font-size:12px;color:var(--ink-soft);margin-top:6px;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--sky-pale);border-top-color:var(--sky);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.small-x{background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;padding:2px 6px;}
.empty-state{text-align:center;padding:40px 20px;color:var(--ink-soft);}
.empty-state h3{color:var(--ink-soft);margin-bottom:8px;}
.modal-overlay{position:fixed;inset:0;background:rgba(22,35,59,.55);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal-card{background:var(--surface);border-radius:14px;padding:24px 26px;width:360px;box-shadow:0 20px 50px rgba(0,0,0,.3);}
.modal-card h3{margin-bottom:16px;}
.modal-card .field{margin-bottom:12px;width:100%;}
.modal-card .field input{width:100%;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}

details.section{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;}
details.section summary{cursor:pointer;padding:12px 16px;background:var(--surface-2);font-family:var(--font-sans);font-weight:500;color:var(--ink);list-style:none;display:flex;align-items:center;justify-content:space-between;}
details.section summary::-webkit-details-marker{display:none;}
details.section summary::after{content:'▸';color:var(--sky);transition:transform .15s;}
details.section[open] summary::after{transform:rotate(90deg);}
details.section .section-body{padding:14px 16px;}
.badge-count{font-size:11px;background:var(--sky-pale);color:var(--sky-deep);border-radius:999px;padding:2px 8px;margin-left:8px;}

.event-card{border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px;background:var(--surface-2);position:relative;}
.event-card .row{margin-bottom:0;}
.event-card .field input{width:100px;}
.event-del{position:absolute;top:6px;right:8px;}

.check-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;}
.check-item{display:flex;align-items:center;gap:8px;font-family:var(--font-sans);font-size:13px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
.check-item input{width:auto;}
code.mono-block{display:block;white-space:pre-wrap;background:var(--ink);color:#DCE8ED;padding:12px 14px;border-radius:8px;font-family:var(--font-mono);font-size:12px;line-height:1.6;}
#codeHint{position:fixed;display:none;background:var(--ink);color:#fff;padding:6px 11px;border-radius:7px;font-size:12.5px;font-family:var(--font-sans);z-index:300;pointer-events:none;white-space:nowrap;box-shadow:0 6px 16px rgba(0,0,0,.28);}
#codeHint.unknown{background:var(--danger);}
input[list]{background-image:none;}
/* ---- Vue carnet papier (4 pages conformes au formulaire ASECNA/Mali Météo) ---- */
.paper-view{background:#dfe4e8;padding:24px 0;margin:0 -20px;}
.paper-page{background:#fff;width:277mm;min-height:190mm;margin:0 auto 28px;padding:8mm 9mm;
  box-shadow:0 6px 18px rgba(0,0,0,.22);font-family:var(--font-mono);font-size:9.5px;color:#111;box-sizing:border-box;}
.paper-page h2{text-align:center;font-size:13px;margin:0 0 2px;font-family:var(--font-sans);font-weight:700;letter-spacing:.02em;}
.paper-page .paper-sub{text-align:center;font-size:10.5px;margin-bottom:8px;font-family:var(--font-sans);}
.paper-page h3{text-align:center;font-size:10px;text-transform:uppercase;letter-spacing:.03em;
  background:#eef2f4;border:1px solid #333;border-bottom:none;margin:10px 0 0;padding:3px 0;font-family:var(--font-sans);}
.paper-page table{width:100%;border-collapse:collapse;margin-bottom:6px;table-layout:fixed;}
.paper-page th, .paper-page td{border:1px solid #333;padding:1.5px 2px;text-align:center;overflow:hidden;white-space:nowrap;}
.paper-page th{background:#eef2f4;font-weight:600;font-family:var(--font-sans);font-size:8.5px;line-height:1.15;}
.paper-page td.rh{background:#f6f6f6;font-weight:600;width:24px;}
.paper-page .colnum{font-size:7.5px;color:#666;font-weight:400;display:block;}
.paper-page .paper-toolbar{max-width:277mm;margin:0 auto 14px;display:flex;gap:10px;justify-content:flex-end;}
.paper-page .mini-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:4px 10px;margin:6px 0 10px;font-family:var(--font-sans);}
.paper-page .mini-grid div{border-bottom:1px dotted #999;padding:1px 0;font-size:9.5px;}
.paper-page .mini-grid b{font-weight:600;}
.paper-page .free-text-box{border:1px solid #333;min-height:60px;padding:4px;font-family:var(--font-sans);font-size:10px;white-space:pre-wrap;}
@media print{
  body *{visibility:hidden;}
  .paper-view, .paper-view *{visibility:visible;}
  .paper-view{position:absolute;top:0;left:0;width:100%;margin:0;padding:0;background:#fff;}
  .paper-page{box-shadow:none;margin:0;width:100%;min-height:0;page-break-after:always;}
  .paper-page:last-child{page-break-after:auto;}
  .paper-toolbar{display:none;}
  @page{size:A4 landscape;margin:8mm;}
}
</style>
</head>

<script>

const ALL_HOURS = Array.from({length:24}, (_,i)=>padHour(i));
const STANDARD_HOURS = ['00','03','06','09','12','15','18','21'];

['00','Aucun développement nuageux observé ou observable'],['01','Nuages en dissolution ou moins développés'],

['16','Précipitation en vue au sol, proche de la station'],['17','Orage sans précipitation'],
['18','Grains à la station ou en vue'],['19','Trombe(s) / nuage en entonnoir'],
['20','Bruine ou neige en grains, cessée depuis <1h'],['21','Pluie, cessée depuis <1h'],
['22','Neige, cessée depuis <1h'],['23','Pluie et neige mêlées ou grésil, cessée'],
['24','Bruine ou pluie verglaçante, cessée'],['25','Averse(s) de pluie, cessée'],
['26','Averse(s) de neige ou pluie/neige, cessée'],['27','Averse(s) de grêle, cessée'],
['28','Brouillard, cessé depuis <1h'],['29','Orage, cessé depuis <1h'],
['30','Tempête poussière/sable faible-modérée, en diminution'],['31','Tempête poussière/sable faible-modérée, stationnaire'],
['32','Tempête poussière/sable faible-modérée, en augmentation'],['33','Tempête poussière/sable forte, en diminution'],
['34','Tempête poussière/sable forte, stationnaire'],['35','Tempête poussière/sable forte, en augmentation'],
['36','Chasse-neige faible ou modérée, basse'],['37','Chasse-neige basse, forte'],
['38','Chasse-neige élevée, faible ou modérée'],['39','Chasse-neige élevée, forte'],

['46','Brouillard, ciel visible, en formation/augmentation'],['47','Brouillard, ciel invisible, en formation/augmentation'],
['48','Brouillard givrant, ciel visible'],['49','Brouillard givrant, ciel invisible'],
['50','Bruine intermittente faible'],['51','Bruine continue faible'],
['52','Bruine intermittente modérée'],['53','Bruine continue modérée'],
['54','Bruine intermittente forte'],['55','Bruine continue forte'],
['56','Bruine verglaçante faible'],['57','Bruine verglaçante modérée ou forte'],
['58','Pluie et bruine faibles'],['59','Pluie et bruine modérées ou fortes'],
['60','Pluie intermittente faible'],['61','Pluie continue faible'],
['62','Pluie intermittente modérée'],['63','Pluie continue modérée'],
['64','Pluie intermittente forte'],['65','Pluie continue forte'],
['66','Pluie verglaçante faible'],['67','Pluie verglaçante modérée ou forte'],
['68','Pluie ou bruine et neige, faibles'],['69','Pluie ou bruine et neige, modérées ou fortes'],
['70','Neige intermittente faible'],['71','Neige continue faible'],
['72','Neige intermittente modérée'],['73','Neige continue modérée'],
['74','Neige intermittente forte'],['75','Neige continue forte'],
['76','Poussière de diamant'],['77','Neige en grains'],
['78','Cristaux de neige isolés (étoilés)'],['79','Granules de glace'],
['80','Averse(s) de pluie faible'],['81','Averse(s) de pluie modérée ou forte'],
['82','Averse(s) de pluie violente'],['83','Averse(s) de pluie et neige mêlées, faible'],
['84','Averse(s) de pluie et neige mêlées, modérée ou forte'],['85','Averse(s) de neige faible'],
['86','Averse(s) de neige modérée ou forte'],['87','Averse(s) de granules de neige/grêle faible'],
['88','Averse(s) de granules de neige/grêle modérée ou forte'],['89','Averse(s) de grêle faible, sans tonnerre'],
['90','Averse(s) de grêle modérée ou forte, sans tonnerre'],['91','Pluie faible + orage pendant l\u2019heure précédente'],
['92','Pluie modérée/forte + orage pendant l\u2019heure précédente'],['93','Neige/pluie-neige/grêle faible + orage préc.'],
['94','Neige/pluie-neige/grêle forte + orage préc.'],['95','Orage faible/modéré, sans grêle, avec pluie/neige'],
['96','Orage faible/modéré, avec grêle'],['97','Orage fort, sans grêle, avec pluie/neige'],
['98','Orage combiné à tempête de poussière/sable'],['99','Orage fort avec grêle']
];
const W_CODES = [
['0','Nébulosité ≤ 4/8 pendant toute la période'],['1','Nébulosité > 4/8 une partie, ≤4/8 le reste'],
['2','Nébulosité > 4/8 pendant toute la période'],['3','Tempête de sable, de poussière ou chasse-neige'],
['4','Brouillard ou brume épaisse'],['5','Bruine'],['6','Pluie'],
['7','Neige, ou pluie et neige mêlées'],['8','Averse(s)'],['9','Orage(s), avec ou sans précipitation']
];
const CL_CODES = [
['/','Non observable (obscurci)'],['0','Pas de Sc/St/Cu/Cb'],
['1','Cumulus peu développé ou déchiqueté'],['2','Cumulus modérément ou fortement développé'],
['3','Cumulonimbus, sommet non fibreux, sans enclume nette'],['4','Stratocumulus formé par étalement de Cumulus'],

['9','Cumulonimbus à sommet fibreux (enclume nette)']
];
const CM_CODES = [
['/','Non observable'],['0','Pas d\u2019Ac/As/Ns'],
['1','Altostratus semi-transparent'],['2','Altostratus épais ou Nimbostratus'],
['3','Altocumulus semi-transparent, niveau unique'],['4','Altocumulus en bancs (amande/poisson)'],
['5','Altocumulus semi-transparent en bandes, envahissant'],['6','Altocumulus issu d\u2019étalement de Cumulus'],
['7','Altocumulus en couches opaques, n\u2019envahissant pas'],['8','Altocumulus en tourelles ou chaotique'],
['9','Altocumulus à plusieurs niveaux, ciel chaotique']
];
const CH_CODES = [
['/','Non observable'],['0','Pas de Ci/Cc/Cs'],
['1','Cirrus en filaments/crochets, n\u2019envahissant pas'],['2','Cirrus dense en bancs (restes de Cb)'],
['3','Cirrus dense en enclume (restes de Cb)'],['4','Cirrus en crochets/filaments, envahissant progressivement'],
['5','Cirrus/Cirrostratus envahissant, voile <45°'],['6','Cirrus/Cirrostratus envahissant, voile >45°'],
['7','Voile de Cirrostratus couvrant tout le ciel'],['8','Cirrostratus n\u2019envahissant pas tout le ciel'],
['9','Cirrocumulus prédominant']
];
const N_CODES = [
['/','Ciel non observable'],['0','Ciel clair (0 octa)'],['1','1 octa (1-2/10)'],['2','2 octas (2-3/10)'],

/* ---- Calculs physiques automatiques (Guide CIMO OMM-N°8, 2008/2010, chap. 4 annexe 4.B) ---- */
// Tension de vapeur saturante — formule de Sonntag, adoptée par l'OMM : es = 6.112 * exp(17.62*t/(243.12+t)), t en °C, es en hPa
function satVaporPressure(t){ return 6.112 * Math.exp(17.62*t/(243.12+t)); }
// Inversion pour retrouver la température depuis une tension de vapeur (point de rosée)
function tempFromVaporPressure(e){ if(e<=0) return null; const x = Math.log(e/6.112); return 243.12*x/(17.62-x); }
// Constante psychrométrique A — OMM (Guide CIMO N°8) : 0,000662 K⁻¹ pour un psychromètre ventilé (type Assmann, ≥2,5 m/s).
// Un psychromètre sous abri non ventilé donnerait une valeur légèrement plus élevée (≈0,0008) — écart généralement <3% d'humidité.
// Vérifié contre l'exemple officiel du Guide CIMO (Tsec=20.2°C, Tw=14.6°C → U=54.39%, Td=10.70°C) : résultat obtenu ici à 0,1% près.
const PSYCHRO_A = 0.000662;
function autoComputeHygro(hourObj, pressionHpa){
  const Tsec = toNum(hourObj.Tsec);
  const Tw = toNum(hourObj.Tw);
  const p = pressionHpa!==null ? pressionHpa : 1013.25;
  if(Tsec!==null && Tw!==null){
    const esTw = satVaporPressure(Tw), esT = satVaporPressure(Tsec);
    const e = esTw - PSYCHRO_A*p*(Tsec-Tw);
    if(e>0){
      const U = Math.max(0, Math.min(100, 100*e/esT));
      const td = tempFromVaporPressure(e);
      hourObj.tensionVapeur = e.toFixed(1);
      hourObj.humidite = String(Math.round(U));
      if(td!==null) hourObj.pointRosee = td.toFixed(1);
      return true;
    }
  } else if(Tsec!==null){
    const U = toNum(hourObj.humidite);
    if(U!==null && U>0){
      const esT = satVaporPressure(Tsec);
      const e = (U/100)*esT;
      const td = tempFromVaporPressure(e);
      hourObj.tensionVapeur = e.toFixed(1);
      if(td!==null) hourObj.pointRosee = td.toFixed(1);
      return true;
    }
  }
  return false;
}
// Réduction de la pression station au niveau de la mer (formule hypsométrique standard, lapse rate 6.5K/km)
function reducePressureToSeaLevel(pressionHpa, altitudeM, tempC){
  if(pressionHpa===null || altitudeM===null || tempC===null) return null;
  const L=0.0065, g=9.80665, R=287.05;
  const expo = g/(R*L);
  const Tk = tempC + 273.15;
  const ratio = 1 - (L*altitudeM)/(Tk + L*altitudeM);
  if(ratio<=0) return null;
  return pressionHpa * Math.pow(ratio, -expo);
}
// Groupe OMM 8NCLCMCH (section 8 du message SYNOP) : composé automatiquement dès que
// N (nébulosité), CL, CM et/ou CH sont renseignés. "/" = valeur manquante (convention OMM).
function computeCloudGroup(hourObj){
  const n = (hourObj.N||'').trim();
  const cl = (hourObj.CL||'').trim();
  const cm = (hourObj.CM||'').trim();
  const ch = (hourObj.CH||'').trim();
  if(!n && !cl && !cm && !ch) return '';
  const part = v => v===''?'/':v;
  return `8${part(n)}${part(cl)}${part(cm)}${part(ch)}`;
}
// Une couche nuageuse significative (N5C5h5) tient en 3 caractères : quantité, genre, hauteur.
// On decompose le code stocke pour piloter 3 mini-champs guides, et on le recompose des que
// l'un des 3 change — l'observateur n'a jamais a taper le code lui-meme.
function parseTripletCode(val){
  const s = (val||'').trim();
  if(s.length===3) return {n:s[0], c:s[1], h:s[2]};
  return {n:'', c:'', h:''};
}
function composeTripletCode(n, c, h){
  n=(n||'').trim(); c=(c||'').trim(); h=(h||'').trim();
  if(!n && !c && !h) return '';
  const part = v => v===''?'/':v;
  return `${part(n)}${part(c)}${part(h)}`;
}
// Format attendu dans le texte libre "hauteur/genre/espèce/secteur" : les abréviations
// OFFICIELLES de l'OMM (Atlas international des nuages, Annexe I du Règlement technique
// OMM-N°49, Tableau 3), par ex. "Cu con 3/8 600m" pour Cumulus congestus, 3 octas, 600m.
// Si l'observateur respecte ce format, la reconnaissance est fiable — ce n'est plus une
// devinette : ce sont des mots reconnus au sens exact du vocabulaire officiel.
const CLOUD_GENUS_DICT = {
  ci:'0', cirrus:'0', cc:'1', cirrocumulus:'1', cs:'2', cirrostratus:'2',
  ac:'3', altocumulus:'3', as:'4', altostratus:'4', ns:'5', nimbostratus:'5',
  sc:'6', stratocumulus:'6', st:'7', stratus:'7', cu:'8', cumulus:'8', cb:'9', cumulonimbus:'9'
};
// Espèces (Tableau 3) — reconnues mais non codées dans N5C5h5 (l'OMM n'a pas de digit pour
// l'espèce dans ce groupe précis) ; utiles seulement pour valider que le mot est bien connu.
const CLOUD_SPECIES_DICT = {
  fib:'fibratus', unc:'uncinus', spi:'spissatus', cas:'castellanus', flo:'floccus',
  str:'stratiformis', neb:'nebulosus', len:'lenticularis', vol:'volutus', fra:'fractus',
  hum:'humilis', med:'mediocris', con:'congestus', cal:'calvus', cap:'capillatus'
};
function nearestHeightCode5(meters){
  const ranges = [[0,49,'0'],[50,99,'1'],[100,199,'2'],[200,299,'3'],[300,599,'4'],
                  [600,999,'5'],[1000,1499,'6'],[1500,1999,'7'],[2000,2499,'8'],[2500,999999,'9']];
  for(const [lo,hi,code] of ranges) if(meters>=lo && meters<=hi) return code;
  return '9';
}
// "as", "st" et "ci" sont des abréviations OMM valides mais aussi des mots français très
// courants ("tu as", "ci-dessus", nom de lieu abrégé "St-..."). Pour éviter les faux positifs,
// on ne les accepte que si une espèce reconnue suit juste après, ou si un chiffre (quantité
// ou hauteur) apparaît juste à côté — signe qu'il s'agit bien d'un vrai code nuage.
const CLOUD_GENUS_AMBIGUOUS = { as:1, st:1, ci:1 };
function parseCloudCodesFromText(text){
  if(!text || !text.trim()) return [];
  const words = [...text.matchAll(/[A-Za-zÀ-ÿ]+/g)];
  const found = [];
  words.forEach((m, idx)=>{
    const w = m[0].toLowerCase();
    if(CLOUD_GENUS_DICT[w] === undefined) return;
    if(CLOUD_GENUS_AMBIGUOUS[w]){
      const next = words[idx+1];
      const nextWord = next ? next[0].toLowerCase() : '';
      const followedBySpecies = CLOUD_SPECIES_DICT[nextWord] !== undefined;
      const nearbyText = text.slice(m.index, m.index+18);
      const followedByNumber = /\d/.test(nearbyText);
      if(!followedBySpecies && !followedByNumber) return;
    }
    found.push({code: CLOUD_GENUS_DICT[w], index: m.index});
  });
  const fracMatches = [...text.matchAll(/(\d)\s*\/\s*8/g)].map(m=>({n:m[1], index:m.index}));
  const heightMatches = [...text.matchAll(/(\d{2,5})\s*m\b/gi)].map(m=>({m:parseInt(m[1],10), index:m.index}));
  const closest = (arr, idx) => arr.length ? arr.reduce((best,cur)=> Math.abs(cur.index-idx)<Math.abs(best.index-idx)?cur:best, arr[0]) : null;
  return found.slice(0,4).map(f=>{
    const fr = closest(fracMatches, f.index);
    const ht = closest(heightMatches, f.index);
    return { n: fr ? fr.n : '', c: f.code, h: ht ? nearestHeightCode5(ht.m) : '' };
  });
}

async function apiFetch(url, opts){
  const r = await fetch(url, opts);

    throw new Error('Session expirée — reconnectez-vous.');

function nearestStandardHour(){
  const h = new Date().getUTCHours();
  let best = STANDARD_HOURS[0], bestDiff = 24;
  STANDARD_HOURS.forEach(sh=>{
    const shN = parseInt(sh,10);
    const diff = Math.min(Math.abs(shN-h), 24-Math.abs(shN-h));
    if(diff<bestDiff){ bestDiff = diff; best = sh; }
  });
  return best;
}

/* ---------------- calculation engine ---------------- */
function cloudWord(N){
  const n = toNum(N); if(n===null) return null;
  if(n<=2) return 'ciel clair'; if(n<=4) return 'ciel peu nuageux';
  if(n<=6) return 'ciel nuageux'; return 'ciel très nuageux';
}
function dailyResume(rec){
  if(!rec) return '';
  const Ns = ALL_HOURS.map(h=> toNum(rec.hours[h] && rec.hours[h].N)).filter(v=>v!==null);
  const maxN = Ns.length ? Math.max(...Ns) : null;
  const cloudTxt = maxN!==null ? cloudWord(maxN) : 'ciel non renseigné';
  const dirs = ALL_HOURS.map(h=> rec.hours[h] && rec.hours[h].ventDirLettres).filter(Boolean);
  const uniqDirs = [...new Set(dirs)];
  const ventTxt = uniqDirs.length ? `vent ${uniqDirs.join('/')}` : 'vent non renseigné';
  const phenList = PHEN_CHECKS.filter(p=> rec.extras && rec.extras[p.k]).map(p=>p.label.toLowerCase());
  const phenFree = ((rec.extras && rec.extras.phenomenesRemarquables) || '').trim();
  const phenAll = [...phenList, ...(phenFree?[phenFree]:[])].join(', ');
  return `${cloudTxt}, ${ventTxt}${phenAll ? ', '+phenAll : ''}.`;
}
// Tableau des vents (formulaire ASECNA/OMM) : pour chaque direction et chaque seuil de
// vitesse, on compte le nombre d'observations dont la vitesse a été ÉGALE OU SUPÉRIEURE
// à ce seuil (cumulatif, pas un histogramme par valeur exacte — c'est ce que demande le
// tableau papier "Nombre de fois que ... la vitesse du vent a été ... égale ou supérieure
// à Xm/s"). Les lignes vont de 1 jusqu'à la vitesse max observée, sans trou.
function computeWindFreq18(records){
  const exact = {}; DIRECTIONS_18.forEach(d=>exact[d]={});
  let total=0, under1=0, under2=0, calme=0, maxSpeed=1;
  records.forEach(rec=>{
    ALL_HOURS.forEach(h=>{
      const hr = rec.hours[h]; if(!hr) return;
      const dz = (hr.ventDirDizaines||'').trim();
      const dzPadded = dz ? dz.padStart(2,'0') : '';
      const vitRaw = toNum(hr.ventVitMs);
      const dirLettres = (hr.ventDirLettres||'').trim().toLowerCase();
      if(!dzPadded && vitRaw===null && !dirLettres) return;
      const isCalme = dirLettres==='calme' || (vitRaw!==null && vitRaw===0 && !dzPadded);
      total++;
      if(vitRaw!==null){ if(vitRaw<1) under1++; if(vitRaw<2) under2++; }
      if(isCalme){ calme++; return; }
      if(!DIRECTIONS_18.includes(dzPadded)) return;
      const speed = vitRaw===null? 0 : Math.round(vitRaw);
      if(speed>maxSpeed) maxSpeed = speed;
      exact[dzPadded][speed] = (exact[dzPadded][speed]||0) + 1;
    });
  });
  const rows = []; for(let s=maxSpeed; s>=1; s--) rows.push(s);
  const table = {};
  DIRECTIONS_18.forEach(d=>{
    table[d] = {};
    let running = 0;
    for(let s=maxSpeed; s>=1; s--){ running += (exact[d][s]||0); table[d][s] = running; }
  });
  return {table, rows, total, under1, under2, calme};
}
function computeHourlyMeans(records){
  const sums={}; ALL_HOURS.forEach(h=>sums[h]={t:0,tc:0, p:0,pc:0, n:0,nc:0, mer:0,merc:0, tens:0,tensc:0});
  records.forEach(rec=>{
    ALL_HOURS.forEach(h=>{
      const hr = rec.hours[h]; if(!hr) return;
      const t = toNum(hr.Tsec); if(t!==null){ sums[h].t+=t; sums[h].tc++; }
      const p = toNum(hr.pressionLue); if(p!==null){ sums[h].p+=p; sums[h].pc++; }
      const n = toNum(hr.N); if(n!==null){ sums[h].n+=n; sums[h].nc++; }
      const mer = toNum(hr.niveauMerPression); if(mer!==null){ sums[h].mer+=mer; sums[h].merc++; }
      const tens = toNum(hr.tensionVapeur); if(tens!==null){ sums[h].tens+=tens; sums[h].tensc++; }
    });
  });
  let pAll=0,pAllC=0, merAll=0,merAllC=0, tensAll=0, tensAllC=0, nAll=0, nAllC=0;
  ALL_HOURS.forEach(h=>{ pAll+=sums[h].p; pAllC+=sums[h].pc; merAll+=sums[h].mer; merAllC+=sums[h].merc; tensAll+=sums[h].tens; tensAllC+=sums[h].tensc; nAll+=sums[h].n; nAllC+=sums[h].nc; });
  return {
    perHourTemp: Object.fromEntries(STANDARD_HOURS.map(h=>[h, sums[h].tc? sums[h].t/sums[h].tc : null])),
    pressionMoy: pAllC? pAll/pAllC : null,
    pressionMerMoy: merAllC? merAll/merAllC : null,
    tensionVapeurMoy: tensAllC? tensAll/tensAllC : null,
    nebulositeMoy: nAllC? nAll/nAllC : null
  };
}
function dayMeans(rec){
  if(!rec) return {humMoy:null, pressMoy:null, nebMoy:null};
  let hs=0,hc=0, ps=0,pc=0, ns=0,nc=0;
  ALL_HOURS.forEach(h=>{
    const hr = rec.hours[h]; if(!hr) return;
    const hu = toNum(hr.humidite); if(hu!==null){ hs+=hu; hc++; }
    const p = toNum(hr.pressionLue); if(p!==null){ ps+=p; pc++; }
    const n = toNum(hr.N); if(n!==null){ ns+=n; nc++; }
  });
  return { humMoy: hc? hs/hc : null, pressMoy: pc? ps/pc : null, nebMoy: nc? ns/nc : null };
}
function countPhenDays(records, byDate){
  const counts = {}; PHEN_CHECKS.forEach(p=>counts[p.k]=0);
  records.forEach(rec=>{ PHEN_CHECKS.forEach(p=>{ if(rec.extras && rec.extras[p.k]) counts[p.k]++; }); });
  return counts;
}
function computeMonthly(records, year, month, existingDays){
  const dim = daysInMonth(year, month);
  const byDate = {}; records.forEach(r=> byDate[r.date]=r);
  const days = [];
  for(let d=1; d<=dim; d++){
    const dateStr = `${year}-${pad2(month)}-${pad2(d)}`;
    const rec = byDate[dateStr] || null;
    const prevAgg = (existingDays && existingDays[dateStr]) || null;
    const agg = prevAgg ? {...prevAgg} : emptyDayAgg(dateStr);
    if(rec){
      if(!prevAgg){
        agg.Tn = rec.extras.tempMiniAbri || '';
        agg.Tx = rec.extras.tempMaxiAbri || '';
        agg.tempSolMini = rec.extras.tempSolMini || '';
        agg.tempSolMaxi = rec.extras.tempSolMaxi || '';
        agg.sol10 = rec.extras.sol10_12h || '';
        agg.sol20 = rec.extras.sol20 || '';
        agg.humiditeMaxJour = rec.extras.humiditeMaxJour || '';
        agg.humiditeMinJour = rec.extras.humiditeMinJour || '';
        agg.precipitation24h = rec.extras.precipitation24h || '';
        agg.dureePrecip = rec.extras.duree24h || '';
        agg.evapPiche = rec.extras.evapPiche || '';
        agg.evapBac = rec.extras.evapBac || '';
        agg.insolationTotal = rec.extras.insolationTotal || '';
        agg.rayonnementTotal = rec.extras.rayonnementTotal || '';
        agg.ventMaxInstDir = rec.extras.ventMaxInstDir || '';
        agg.ventMaxInstVit = rec.extras.ventMaxInstVit || '';
        agg.resumeTempsClair = dailyResume(rec);
      }
      agg._hasCarnet = true;
    } else { agg._hasCarnet = false; }
    const dm = dayMeans(rec);
    agg._humMoy = dm.humMoy; agg._pressMoy = dm.pressMoy; agg._nebMoy = dm.nebMoy;
    days.push(agg);
  }
  return { days, byDate, hourly: computeHourlyMeans(records), windFreq: computeWindFreq18(records), phenCounts: countPhenDays(records, byDate), intensiteRemarquable: computeIntensiteRemarquable(records) };
}
// Intensité remarquable de précipitation (mm/h) : la plus forte valeur horaire du mois,
// avec sa date et son heure.
function computeIntensiteRemarquable(records){
  let best=null, bestDate=null, bestHour=null;
  records.forEach(rec=>{
    ALL_HOURS.forEach(h=>{
      const hr = rec.hours[h]; if(!hr) return;
      const v = toNum(hr.intensitePrecip);
      if(v!==null && (best===null || v>best)){ best=v; bestDate=rec.date; bestHour=h; }
    });
  });
  return { value: best, date: bestDate, hour: bestHour };
}
function tempBins(days, key, edges){
  const bins = edges.map((e,i)=> ({label: i===0? `< ${e}`: (i===edges.length? `≥ ${edges[i-1]}` : `${edges[i-1]} – ${e}`), count:0}));
  bins.push({label:`≥ ${edges[edges.length-1]}`, count:0});
  bins.shift();
  const labels = [];
  labels.push(`< ${edges[0]}`);
  for(let i=1;i<edges.length;i++) labels.push(`${edges[i-1]} – ${edges[i]}`);
  labels.push(`≥ ${edges[edges.length-1]}`);
  const counts = labels.map(()=>0);
  days.forEach(d=>{
    const v = toNum(d[key]); if(v===null) return;
    let idx = edges.findIndex(e=> v<e);
    if(idx===-1) idx = labels.length-1;
    counts[idx]++;
  });
  return labels.map((l,i)=>({label:l, count:counts[i]}));
}
function summarize(mensuel){
  const days = mensuel.days;
  let sumTn=0,cTn=0,sumTx=0,cTx=0,maxAbs=null,maxAbsDate=null,minAbs=null,minAbsDate=null;
  let moyBasse=null,moyBasseDate=null,moyHaute=null,moyHauteDate=null;
  let precipTotal=0,precipMax=null,precipMaxDate=null,jGE01=0,jGE1=0,jGE10=0,dureePrecipTotal=0;
  let evapPicheTotal=0,evapBacTotal=0,insolTotal=0,rayonTotal=0;
  let ventMax=null,ventMaxDate=null,ventMaxDir=null;
  let humMin=null,humMinDate=null,humMax=null,humMaxDate=null;
  let sol10Sum=0,sol10C=0, sol20Sum=0, sol20C=0;
  days.forEach(d=>{
    const tn=toNum(d.Tn), tx=toNum(d.Tx);
    if(tn!==null){ sumTn+=tn; cTn++; if(minAbs===null||tn<minAbs){minAbs=tn;minAbsDate=d.date;} }
    if(tx!==null){ sumTx+=tx; cTx++; if(maxAbs===null||tx>maxAbs){maxAbs=tx;maxAbsDate=d.date;} }
    if(tn!==null&&tx!==null){
      const mq=(tn+tx)/2;
      if(moyBasse===null||mq<moyBasse){moyBasse=mq;moyBasseDate=d.date;}
      if(moyHaute===null||mq>moyHaute){moyHaute=mq;moyHauteDate=d.date;}
    }
    const pr=toNum(d.precipitation24h);
    if(pr!==null){ precipTotal+=pr; if(precipMax===null||pr>precipMax){precipMax=pr;precipMaxDate=d.date;}
      if(pr>=0.1) jGE01++; if(pr>=1) jGE1++; if(pr>=10) jGE10++; }
    const dp=toNum(d.dureePrecip); if(dp!==null) dureePrecipTotal+=dp;
    const ep=toNum(d.evapPiche); if(ep!==null) evapPicheTotal+=ep;
    const eb=toNum(d.evapBac); if(eb!==null) evapBacTotal+=eb;
    const ins=toNum(d.insolationTotal); if(ins!==null) insolTotal+=ins;
    const ray=toNum(d.rayonnementTotal); if(ray!==null) rayonTotal+=ray;
    const s10=toNum(d.sol10); if(s10!==null){ sol10Sum+=s10; sol10C++; }
    const s20=toNum(d.sol20); if(s20!==null){ sol20Sum+=s20; sol20C++; }
    const vv=toNum(d.ventMaxInstVit);
    if(vv!==null && (ventMax===null||vv>ventMax)){ ventMax=vv; ventMaxDate=d.date; ventMaxDir=d.ventMaxInstDir; }
    const uMax = toNum(d.humiditeMaxJour); if(uMax!==null && (humMax===null||uMax>humMax)){ humMax=uMax; humMaxDate=d.date; }
    const uMin = toNum(d.humiditeMinJour); if(uMin!==null && (humMin===null||uMin<humMin)){ humMin=uMin; humMinDate=d.date; }
  });
  return {
    moyTn: cTn?sumTn/cTn:null, moyTx: cTx?sumTx/cTx:null,
    amplitude: (cTn&&cTx)? (sumTx/cTx - sumTn/cTn) : null,
    maxAbs, maxAbsDate, minAbs, minAbsDate, moyBasse, moyBasseDate, moyHaute, moyHauteDate,
    precipTotal, precipMax, precipMaxDate, jGE01, jGE1, jGE10, dureePrecipTotal,
    evapPicheTotal, evapBacTotal, insolTotal, rayonTotal,
    ventMax, ventMaxDate, ventMaxDir, humMin, humMinDate, humMax, humMaxDate,
    sol10Moy: sol10C? sol10Sum/sol10C : null, sol20Moy: sol20C? sol20Sum/sol20C : null
  };
}
function dominantParagraph(mensuel, summary, stationName, monthLabel){
  const freq = mensuel.windFreq;
  let dominant=null, dominantCount=-1;
  DIRECTIONS_18.forEach(d=>{
    const c = freq.table[d][1] || 0; // total des observations non calmes dans cette direction (ligne seuil "≥1m/s")
    if(c>dominantCount){ dominantCount=c; dominant=d; }
  });
  const nebMoy = mensuel.hourly.nebulositeMoy;
  const cielTxt = nebMoy!==null ? cloudWord(nebMoy) : 'ciel non renseigné';
  const phenDaysTotal = Object.values(mensuel.phenCounts).reduce((a,b)=>a+b,0);
  let txt = `${monthLabel} à la station de ${stationName} est marqué par un ${cielTxt} dans l'ensemble, un vent dominant du secteur ${dominant||'variable'} (dizaines de degrés). `;
  if(summary.precipTotal>0) txt += `Les précipitations ont totalisé ${summary.precipTotal.toFixed(1)} mm sur ${summary.jGE01} jour(s) mesurable(s). `;
  else txt += `Aucune précipitation mesurable n'a été enregistrée. `;
  if(phenDaysTotal>0) txt += `${phenDaysTotal} occurrence(s) de phénomène particulier ont été relevées sur le mois (brume, orage, grêle...). `;
  txt += `Les écarts par rapport aux normales climatologiques ne sont pas évalués (aucune normale de référence enregistrée pour cette station).`;
  return txt;
}

function buildClimatDraft(mensuel, summary, station, year, month){
  const pressionStation = mensuel.hourly.pressionMoy;
  const pressionMer = mensuel.hourly.pressionMerMoy;

  const insolTotal = summary.insolTotal;

  return {

    text: `CLIMAT ${pad2(month)}${String(year).slice(2)} —— Station ${station? station.name : ''}

B - Précipitations : jours RR≥1mm = ${jGE1} · quantité totale = ${precipTotal.toFixed(1)} mm · quintile = non évalué (normales non enregistrées)
C - Insolation : durée totale = ${insolTotal.toFixed(1)} h · proportion à la normale = non évaluée (normale non enregistrée)
D - Chiffrement brut : NON GÉNÉRÉ AUTOMATIQUEMENT — le codage CLIMAT/CREX (groupes numériques OMM) nécessite une vérification experte avant toute transmission officielle ; utilisez les valeurs A/B/C ci-dessus comme base de saisie manuelle dans votre logiciel de codage habituel.`
  };
}

      body: JSON.stringify({ images, prompt: buildScanPrompt() })
    });
    if(res.status===501){
      toast('Scan IA non configuré sur ce serveur (voir ANTHROPIC_API_KEY dans le .env).', true);
      state.scanLoading = false; render(); return;
    }
    const data = await res.json();
    const textBlocks = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
    const cleaned = textBlocks.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(cleaned);
    const rec = state.carnetRecord;
    if(parsed.hours){
      Object.keys(parsed.hours).forEach(h=>{
        if(rec.hours[h] && parsed.hours[h]){
          rec.hours[h] = { ...rec.hours[h], ...Object.fromEntries(Object.entries(parsed.hours[h]).filter(([k,v])=> v!==undefined && v!==null && v!=='')) };
        }
      });
    }
    if(parsed.extras){
      const filtered = Object.fromEntries(Object.entries(parsed.extras).filter(([k,v])=> v!==undefined && v!==null && v!==''));
      rec.extras = { ...rec.extras, ...filtered };
    }
    if(Array.isArray(parsed.grainsOrages) && parsed.grainsOrages.length){
      rec.grainsOrages = rec.grainsOrages.concat(parsed.grainsOrages.map(g=>({id:uid(), ...g})));
    }
    if(Array.isArray(parsed.observationsSpeciales) && parsed.observationsSpeciales.length){
      rec.observationsSpeciales = rec.observationsSpeciales.concat(parsed.observationsSpeciales.map(o=>({id:uid(), ...o})));
    }
    state.carnetDirty = true;
    toast('Analyse terminée — vérifiez les valeurs avant d\u2019enregistrer.');
  }catch(e){
    console.error(e);
    toast('Échec de l\u2019analyse. Réessayez ou saisissez manuellement.', true);
  }
  state.scanLoading = false; render();
}

/* ---------------- rendering ---------------- */
function captureGeoStamp(){
  return new Promise((resolve)=>{
    const stamp = { savedAt: new Date().toISOString(), lat: null, lon: null, accuracy: null, error: null };
    if(!('geolocation' in navigator)){ stamp.error = 'Géolocalisation non disponible dans ce navigateur.'; resolve(stamp); return; }
    if(window.isSecureContext===false){ stamp.error = 'Site non sécurisé (HTTPS requis) — position non capturée.'; resolve(stamp); return; }
    const timer = setTimeout(()=>{ stamp.error = 'Délai de localisation dépassé.'; resolve(stamp); }, 6000);
    navigator.geolocation.getCurrentPosition(
      (pos)=>{ clearTimeout(timer); stamp.lat = pos.coords.latitude; stamp.lon = pos.coords.longitude; stamp.accuracy = pos.coords.accuracy; resolve(stamp); },
      (err)=>{ clearTimeout(timer); stamp.error = err && err.message ? err.message : 'Position refusée ou indisponible.'; resolve(stamp); },
      { enableHighAccuracy:false, timeout:5500, maximumAge:60000 }
    );
  });
}
function formatGeoStamp(meta){
  if(!meta) return '';
  const d = new Date(meta.savedAt);
  const dateStr = `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}/${d.getFullYear()} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
  if(meta.lat!==null && meta.lon!==null){
    return `Saisi le ${dateStr} · ${meta.lat.toFixed(5)}°, ${meta.lon.toFixed(5)}° (±${Math.round(meta.accuracy||0)}m)`;
  }
  return `Saisi le ${dateStr} · position non disponible${meta.error?' ('+meta.error+')':''}`;
}
async function saveCurrentDay(successMessage, geoTarget){
  if(geoTarget==='hour'){
    const stamp = await captureGeoStamp();
    state.carnetRecord.hours[state.rapideHour].meta = stamp;
  } else if(geoTarget==='day'){
    state.carnetRecord.meta = await captureGeoStamp();
  }
  const ok = await saveCarnetRecord(state.carnetRecord);
  if(ok){
    if(!state.carnetSavedDays.includes(state.carnetDate)) state.carnetSavedDays.push(state.carnetDate);
    state.carnetDirty = false;
    state.carnetLastSaved = new Date();
    toast(successMessage);
    const cachetEl = document.querySelector('.cachet'); if(cachetEl){ cachetEl.classList.remove('stamp-anim'); void cachetEl.offsetWidth; cachetEl.classList.add('stamp-anim'); }
    render();
  } else toast('Échec de l\u2019enregistrement — vos modifications restent affichées mais ne sont pas sauvegardées. Réessayez.', true);
}
function updateSaveIndicator(){
  const el = document.getElementById('saveIndicator');
  if(!el) return;
  if(state.carnetDirty){
    el.innerHTML = '<span style="color:var(--brass);font-size:12px;">● Modifications non enregistrées</span>';
  } else if(state.carnetLastSaved){
    const t = state.carnetLastSaved;
    const hh = pad2(t.getHours ? t.getHours() : new Date(t).getHours());
    const mm = pad2(t.getMinutes ? t.getMinutes() : new Date(t).getMinutes());
    el.innerHTML = `<span style="color:var(--ok);font-size:12px;">✓ Enregistré à ${hh}:${mm}</span>`;
  } else {
    el.innerHTML = '';
  }
}

function bindAuthEvents(){
  const toRegister = document.getElementById('toRegisterLink');
  if(toRegister) toRegister.onclick = async (e)=>{

    if(!state.publicStations.length) state.publicStations = await loadPublicStations();
    render();
  };
  const toLogin = document.getElementById('toLoginLink');
  if(toLogin) toLogin.onclick = (e)=>{ e.preventDefault(); state.authView = 'login'; state.loginError = null; render(); };

  if(state.authView==='register') bindRegisterEvents(); else bindLoginEvents();
}
function bindLoginEvents(){
  const submit = async ()=>{
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    if(!username || !password){ state.loginError = 'Identifiant et mot de passe requis.'; render(); return; }
    state.loginBusy = true; state.loginError = null; render();
    try{
      const r = await fetch('/api/auth/login', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username, password})});
      const data = await r.json();
      if(!r.ok){ state.loginError = data.error || 'Échec de connexion.'; state.loginBusy = false; render(); return; }
      state.currentUser = data;
      state.loginBusy = false;
      await bootAfterLogin();
    }catch(e){ state.loginError = 'Erreur réseau — le serveur est-il démarré ?'; state.loginBusy = false; render(); }
  };
  const btn = document.getElementById('loginSubmitBtn'); if(btn) btn.onclick = submit;
  const pwd = document.getElementById('loginPassword'); if(pwd) pwd.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
  const usr = document.getElementById('loginUsername'); if(usr) usr.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
}
function bindRegisterEvents(){
  const stationChoice = document.getElementById('registerStationChoice');
  const newStationFields = document.getElementById('newStationFields');
  const syncNewStationVisibility = ()=>{
    if(newStationFields) newStationFields.style.display = (stationChoice && stationChoice.value==='__new__') ? '' : 'none';
  };
  if(stationChoice){ stationChoice.onchange = syncNewStationVisibility; syncNewStationVisibility(); }

  const submit = async ()=>{
    const stationChoiceVal = document.getElementById('registerStationChoice').value;
    const fullName = document.getElementById('registerFullName').value.trim();
    const username = document.getElementById('registerUsername').value.trim();
    const password = document.getElementById('registerPassword').value;
    const confirmPwd = document.getElementById('registerPasswordConfirm').value;
    if(!fullName || !username || !password){ state.registerError = 'Tous les champs sont requis.'; render(); return; }
    if(password.length<6){ state.registerError = 'Mot de passe trop court (6 caractères minimum).'; render(); return; }
    if(password!==confirmPwd){ state.registerError = 'Les deux mots de passe ne correspondent pas.'; render(); return; }
    const body = { fullName, username, password };
    if(stationChoiceVal==='__new__'){
      const newName = document.getElementById('registerNewStationName').value.trim();
      if(!newName){ state.registerError = 'Indiquez le nom de votre station.'; render(); return; }
      body.newStation = {
        name: newName,
        lat: document.getElementById('registerNewStationLat').value.trim(),
        lon: document.getElementById('registerNewStationLon').value.trim(),
        alt: document.getElementById('registerNewStationAlt').value.trim()
      };
    } else {
      body.stationId = stationChoiceVal;
    }
    state.registerBusy = true; state.registerError = null; render();
    try{
      const r = await fetch('/api/auth/register', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
      const data = await r.json();
      if(!r.ok){ state.registerError = data.error || "Échec de l'inscription."; state.registerBusy = false; render(); return; }
      state.currentUser = data;
      state.registerBusy = false;
      await bootAfterLogin();
    }catch(e){ state.registerError = 'Erreur réseau — le serveur est-il démarré ?'; state.registerBusy = false; render(); }
  };
  const btn = document.getElementById('registerSubmitBtn'); if(btn) btn.onclick = submit;
}

/* ================= Vue TCM papier (Tableau Climatologique Mensuel), ENTIÈREMENT ÉDITABLE =================
   Même principe que la vue carnet papier : les cases se remplissent directement, mais comme
   ces tables croisent plusieurs jours, chaque modification sauvegarde IMMÉDIATEMENT le jour
   concerné (pas besoin de revenir sur le Carnet), puis rafraîchit les totaux/moyennes affichés. */
function tcmPageWrap(station, monthLabel, title, bodyHtml){
  return `<div class="paper-page">
    <div style="display:flex;justify-content:space-between;font-family:var(--font-sans);font-size:9.5px;margin-bottom:2px;">
      <div><b>Station : ${escapeHtml(station.name)}</b></div><div>Mois : ${escapeHtml(monthLabel)}</div>
    </div>
    <h2>${escapeHtml(title)}</h2>
    ${bodyHtml}
  </div>`;
}
function monthlyDayHourCell(m, dateStr, hour, field, width){
  const rec = m.byDate[dateStr];
  const val = rec && rec.hours[hour] ? (rec.hours[hour][field]||'') : '';
  return `<td><input type="text" class="monthly-hour-input" data-m-date="${dateStr}" data-m-hour="${hour}" data-m-field="${field}" value="${escapeAttr(val)}" style="width:${width||36}px;"></td>`;
}
function dayHourStats(m, dateStr, field){
  const rec = m.byDate[dateStr];
  if(!rec) return {total:null, moy:null, min:null, minH:null, max:null, maxH:null};
  let total=0,count=0,min=null,minH=null,max=null,maxH=null;
  STANDARD_HOURS.forEach(h=>{
    const v = toNum(rec.hours[h] && rec.hours[h][field]);
    if(v!==null){ total+=v; count++; if(min===null||v<min){min=v;minH=h;} if(max===null||v>max){max=v;maxH=h;} }
  });
  return {total: count?total:null, moy: count?total/count:null, min, minH, max, maxH};
}
function paperMonthlyHourGrid(m, dates, field){
  return `<table>
    <thead><tr><th>Date</th>${STANDARD_HOURS.map(h=>`<th>${h}h</th>`).join('')}<th>Total</th><th>Moy.</th><th>Min</th><th>Heure</th><th>Max</th><th>Heure</th></tr></thead>
    <tbody>
      ${dates.map((dateStr,i)=>{
        const stats = dayHourStats(m, dateStr, field);
        const cells = STANDARD_HOURS.map(h=> monthlyDayHourCell(m, dateStr, h, field)).join('');
        return `<tr><td class="rh">${i+1}</td>${cells}<td>${fmt(stats.total)}</td><td>${fmt(stats.moy)}</td><td>${fmt(stats.min)}</td><td>${stats.minH||''}</td><td>${fmt(stats.max)}</td><td>${stats.maxH||''}</td></tr>`;
      }).join('')}
    </tbody>
  </table>`;
}
function tcmVentBody(m, dates, summary){
  let grandTotalVit=0, grandCountVit=0;
  const rows = dates.map((dateStr,i)=>{
    let vitSum=0, vitCount=0;
    const cells = STANDARD_HOURS.map(h=>{
      const rec = m.byDate[dateStr];
      const dir = rec && rec.hours[h] ? (rec.hours[h].ventDirDizaines||'') : '';
      const vit = rec && rec.hours[h] ? (rec.hours[h].ventVitMs||'') : '';
      const vitNum = toNum(vit); if(vitNum!==null){ vitSum+=vitNum; vitCount++; grandTotalVit+=vitNum; grandCountVit++; }
      return `<td><input type="text" class="monthly-hour-input" data-m-date="${dateStr}" data-m-hour="${h}" data-m-field="ventDirDizaines" value="${escapeAttr(dir)}" style="width:24px;"></td><td><input type="text" class="monthly-hour-input" data-m-date="${dateStr}" data-m-hour="${h}" data-m-field="ventVitMs" value="${escapeAttr(vit)}" style="width:24px;"></td>`;
    }).join('');
    return `<tr><td class="rh">${i+1}</td>${cells}<td>${vitCount?fmt(vitSum):''}</td><td>${vitCount?fmt(vitSum/vitCount):''}</td></tr>`;
  }).join('');
  return `
  <table>
    <thead>
      <tr><th rowspan="2">Date</th>${STANDARD_HOURS.map(h=>`<th colspan="2">${h}h</th>`).join('')}<th rowspan="2">Total<br>vit.</th><th rowspan="2">Moy.<br>vit.</th></tr>
      <tr>${STANDARD_HOURS.map(()=>'<th>Dir.</th><th>Vit.</th>').join('')}</tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>
  <div class="mini-grid"><div><b>Vitesse maximale instantanée du mois :</b> ${escapeHtml(summary.ventMaxDir||'—')} / ${fmt(summary.ventMax)} m/s — ${escapeHtml(summary.ventMaxDate||'—')}</div></div>`;
}

function tcmMonthEventsList(dates, m){

  });
  if(!rows.length) return `<p class="help">Aucun événement enregistré ce mois-ci.</p>`;
  return `<table><thead><tr><th>Date</th><th>Type</th><th style="text-align:left;">Détail</th></tr></thead>

function renderCalendarStrip(station){
  const [y,m] = state.carnetDate.split('-');
  const dim = daysInMonth(parseInt(y), parseInt(m));
  const saved = new Set(state.carnetSavedDays);
  let pills = '';
  for(let d=1; d<=dim; d++){
    const dateStr = `${y}-${m}-${pad2(d)}`;
    const isSaved = saved.has(dateStr);
    const isCurrent = dateStr===state.carnetDate;
    pills += `<span class="pill ${isSaved?'saved':'missing'}" data-jump="${dateStr}" style="${isCurrent?'box-shadow:0 0 0 2px var(--sky) inset;':''}">${d}</span>`;
  }
  return `<div style="margin-top:14px;"><div class="calendar-row">${pills}</div><p class="help">En vert : jours déjà enregistrés ce mois-ci pour ${escapeHtml(station.name)}.</p></div>`;
}
