function renderMensuelBody(m, station){
  const summary = summarize(m);
  const monthLabel = `${MONTH_NAMES[state.mensuelMonth-1]} ${state.mensuelYear}`;
  const climat = buildClimatDraft(m, summary, station, state.mensuelYear, state.mensuelMonth);
  return `
  ${section('mRecap', 'Récapitulatif journalier', `
    <div class="tbl-wrap">
      <table class="grid">
        <thead><tr>
          <th>Jour</th><th>Tn °C</th><th>Tx °C</th><th>Moy °C</th><th>Hum.moy %</th><th>Ux %</th><th>Un %</th><th>Press.moy</th><th>Néb.moy</th>
          <th>Précip mm</th><th>Durée h</th><th>Evap.Piche</th><th>Evap.Bac</th><th>Insol. h</th><th>Rayon.</th><th>Sol10</th><th>Sol20</th><th>V.max dir</th><th>V.max m/s</th><th>Résumé</th>
        </tr></thead>
        <tbody>
          ${m.days.map((d,idx)=>{
            const tn=toNum(d.Tn), tx=toNum(d.Tx);
            const moy=(tn!==null&&tx!==null)?((tn+tx)/2).toFixed(1):'';
            return `<tr>
              <td class="rowhead">${idx+1}${d._hasCarnet?' <span title="jour issu du carnet" style="color:var(--ok);">●</span>':''}</td>
              <td><input type="text" data-day="${idx}" data-dfield="Tn" value="${escapeAttr(d.Tn)}"></td>
              <td><input type="text" data-day="${idx}" data-dfield="Tx" value="${escapeAttr(d.Tx)}"></td>
              <td>${moy}</td>
              <td>${d._humMoy!==null&&d._humMoy!==undefined?d._humMoy.toFixed(0):''}</td>
              <td><input type="text" data-day="${idx}" data-dfield="humiditeMaxJour" value="${escapeAttr(d.humiditeMaxJour)}" style="width:44px;"></td>
              <td><input type="text" data-day="${idx}" data-dfield="humiditeMinJour" value="${escapeAttr(d.humiditeMinJour)}" style="width:44px;"></td>
              <td>${d._pressMoy!==null&&d._pressMoy!==undefined?d._pressMoy.toFixed(1):''}</td>
              <td>${d._nebMoy!==null&&d._nebMoy!==undefined?d._nebMoy.toFixed(1):''}</td>
              <td><input type="text" data-day="${idx}" data-dfield="precipitation24h" value="${escapeAttr(d.precipitation24h)}"></td>
              <td><input type="text" data-day="${idx}" data-dfield="dureePrecip" value="${escapeAttr(d.dureePrecip)}" style="width:50px;"></td>
              <td><input type="text" data-day="${idx}" data-dfield="evapPiche" value="${escapeAttr(d.evapPiche)}"></td>
              <td><input type="text" data-day="${idx}" data-dfield="evapBac" value="${escapeAttr(d.evapBac)}"></td>
              <td><input type="text" data-day="${idx}" data-dfield="insolationTotal" value="${escapeAttr(d.insolationTotal)}"></td>
              <td><input type="text" data-day="${idx}" data-dfield="rayonnementTotal" value="${escapeAttr(d.rayonnementTotal)}"></td>
              <td><input type="text" data-day="${idx}" data-dfield="sol10" value="${escapeAttr(d.sol10)}" style="width:50px;"></td>
              <td><input type="text" data-day="${idx}" data-dfield="sol20" value="${escapeAttr(d.sol20)}" style="width:50px;"></td>
              <td><input type="text" data-day="${idx}" data-dfield="ventMaxInstDir" value="${escapeAttr(d.ventMaxInstDir)}" style="width:44px;"></td>
              <td><input type="text" data-day="${idx}" data-dfield="ventMaxInstVit" value="${escapeAttr(d.ventMaxInstVit)}" style="width:44px;"></td>
              <td><input type="text" data-day="${idx}" data-dfield="resumeTempsClair" value="${escapeAttr(d.resumeTempsClair)}" style="width:220px;text-align:left;font-family:var(--font-sans);"></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`)}

  ${section('mExtremes', 'Extrêmes et totaux du mois', `
    <div class="metric-grid">
      <div class="metric"><div class="label">Moy. Tn / Tx</div><div class="value">${fmt(summary.moyTn)} / ${fmt(summary.moyTx)} °C</div><div class="sub">Amplitude ${fmt(summary.amplitude)} °C</div></div>
      <div class="metric"><div class="label">Max absolu</div><div class="value">${fmt(summary.maxAbs)} °C</div><div class="sub">${summary.maxAbsDate||'—'}</div></div>
      <div class="metric"><div class="label">Min absolu</div><div class="value">${fmt(summary.minAbs)} °C</div><div class="sub">${summary.minAbsDate||'—'}</div></div>
      <div class="metric"><div class="label">Moy. quot. + basse</div><div class="value">${fmt(summary.moyBasse)} °C</div><div class="sub">${summary.moyBasseDate||'—'}</div></div>
      <div class="metric"><div class="label">Moy. quot. + élevée</div><div class="value">${fmt(summary.moyHaute)} °C</div><div class="sub">${summary.moyHauteDate||'—'}</div></div>
      <div class="metric"><div class="label">Ux max / Un min (jour)</div><div class="value">${fmt(summary.humMax,0)} / ${fmt(summary.humMin,0)} %</div><div class="sub">${summary.humMaxDate||'—'} / ${summary.humMinDate||'—'}</div></div>
      <div class="metric"><div class="label">Précipitations totales</div><div class="value">${fmt(summary.precipTotal)} mm</div><div class="sub">≥0.1mm: ${summary.jGE01}j · ≥1mm: ${summary.jGE1}j · ≥10mm: ${summary.jGE10}j</div></div>
      <div class="metric"><div class="label">Durée totale précip.</div><div class="value">${fmt(summary.dureePrecipTotal)} h</div></div>
      <div class="metric"><div class="label">Max 24h</div><div class="value">${fmt(summary.precipMax)} mm</div><div class="sub">${summary.precipMaxDate||'—'}</div></div>
      <div class="metric"><div class="label">Intensité remarquable</div><div class="value">${fmt(m.intensiteRemarquable.value)} mm/h</div><div class="sub">${m.intensiteRemarquable.date?`${m.intensiteRemarquable.date} à ${m.intensiteRemarquable.hour}TU`:'—'}</div></div>
      <div class="metric"><div class="label">Évaporation Piché / Bac</div><div class="value">${fmt(summary.evapPicheTotal)} / ${fmt(summary.evapBacTotal)} mm</div></div>
      <div class="metric"><div class="label">Insolation / Rayonnement</div><div class="value">${fmt(summary.insolTotal)} h / ${fmt(summary.rayonTotal)}</div></div>
      <div class="metric"><div class="label">Vent max instantané</div><div class="value">${fmt(summary.ventMax)} m/s</div><div class="sub">${summary.ventMaxDir||'—'} · ${summary.ventMaxDate||'—'}</div></div>
      <div class="metric"><div class="label">Pression moy. (station/mer)</div><div class="value">${fmt(m.hourly.pressionMoy)} / ${fmt(m.hourly.pressionMerMoy)} hPa</div></div>
      <div class="metric"><div class="label">Nébulosité moy. / Tension vap. moy.</div><div class="value">${fmt(m.hourly.nebulositeMoy)} / ${fmt(m.hourly.tensionVapeurMoy)} hPa</div></div>
      <div class="metric"><div class="label">Sol 10cm / 20cm moy.</div><div class="value">${fmt(summary.sol10Moy)} / ${fmt(summary.sol20Moy)} °C</div></div>
      <div class="metric"><div class="label">Moy. à 06 / 12 / 18 TU</div><div class="value" style="font-size:14px;">${fmt(m.hourly.perHourTemp['06'])} / ${fmt(m.hourly.perHourTemp['12'])} / ${fmt(m.hourly.perHourTemp['18'])} °C</div></div>
    </div>`)}

  ${section('mPhenCounts', 'Jours avec phénomènes observés', `
    <div class="tbl-wrap"><table class="grid"><thead><tr>${PHEN_CHECKS.map(p=>`<th>${p.label}</th>`).join('')}</tr></thead>
    <tbody><tr>${PHEN_CHECKS.map(p=>`<td>${m.phenCounts[p.k]||0}</td>`).join('')}</tr></tbody></table></div>
    <p class="help">Comptage à partir des cases cochées dans la section 15 du carnet, jour par jour.</p>`)}

  ${section('mTempBins', 'Répartition des températures du mois', `
    <div class="row" style="align-items:flex-start;">
      <div style="flex:1;min-width:260px;"><h3 style="font-size:13px;margin-bottom:8px;">Tn (mini sous abri)</h3>
        <div class="tbl-wrap"><table class="grid"><thead><tr>${tempBins(m.days,'Tn',[15,20,25,30]).map(b=>`<th>${b.label}</th>`).join('')}</tr></thead>
        <tbody><tr>${tempBins(m.days,'Tn',[15,20,25,30]).map(b=>`<td>${b.count}</td>`).join('')}</tr></tbody></table></div>
      </div>
      <div style="flex:1;min-width:260px;"><h3 style="font-size:13px;margin-bottom:8px;">Tx (maxi sous abri)</h3>
        <div class="tbl-wrap"><table class="grid"><thead><tr>${tempBins(m.days,'Tx',[30,35,40,45]).map(b=>`<th>${b.label}</th>`).join('')}</tr></thead>
        <tbody><tr>${tempBins(m.days,'Tx',[30,35,40,45]).map(b=>`<td>${b.count}</td>`).join('')}</tr></tbody></table></div>
      </div>
    </div>`)}

  ${section('mWind', 'Fréquence du vent (18 directions × vitesse, ' + m.windFreq.total + ' observations)', `
    <div class="tbl-wrap"><table class="grid"><thead><tr><th>Vit. m/s</th>${DIRECTIONS_18.map(d=>`<th>${d}</th>`).join('')}<th>Total</th></tr></thead>
    <tbody>
      ${m.windFreq.rows.map(sp=>{
        const rowTotal = DIRECTIONS_18.reduce((a,d)=> a+(m.windFreq.table[d][sp]||0), 0);
        return `<tr><td class="rowhead">${sp}</td>${DIRECTIONS_18.map(d=>`<td>${m.windFreq.table[d][sp]||0}</td>`).join('')}<td>${rowTotal}</td></tr>`;
      }).join('')}
      <tr class="total-row"><td>Calme</td><td colspan="${DIRECTIONS_18.length}">Nombre de calmes : ${m.windFreq.calme} · Vent &lt;1m/s : ${m.windFreq.under1} · Vent &lt;2m/s : ${m.windFreq.under2}</td><td>${m.windFreq.total}</td></tr>
    </tbody></table></div>
    <p class="help">Directions en dizaines de degrés (02 = 20°, 36 = 360°/Nord).</p>`)}

  ${section('mClimat', 'Message CLIMAT — moyennes et brouillon de chiffrement', `
    <div class="metric-grid" style="margin-bottom:14px;">
      <div class="metric"><div class="label">Pression station moy.</div><div class="value">${fmt(climat.pressionStation)} hPa</div></div>
      <div class="metric"><div class="label">Pression mer moy.</div><div class="value">${fmt(climat.pressionMer)} hPa</div></div>
      <div class="metric"><div class="label">Température sous abri moy.</div><div class="value">${fmt(climat.tempAbri)} °C</div></div>
      <div class="metric"><div class="label">Tension de vapeur moy.</div><div class="value">${fmt(climat.tension)} hPa</div></div>
    </div>
    <code class="mono-block">${escapeHtml(climat.text)}</code>
    <p class="help">Le chiffrement CLIMAT/CREX complet (groupes numériques OMM) n'est pas généré automatiquement : il exige une vérification experte avant transmission officielle. Les moyennes ci-dessus servent de base de saisie dans votre outil de codage habituel.</p>`)}

  ${section('mDominant', 'Caractères dominants du mois', `
    <textarea class="wide" id="dominantText" style="min-height:90px;">${escapeHtml(m.dominantText || dominantParagraph(m, summary, station.name, monthLabel))}</textarea>
    <p class="help">Texte généré automatiquement à partir des données saisies — modifiable librement.</p>`)}
  `;
}
function fmt(v, dec){ if(v===null||v===undefined||isNaN(v)) return '—'; return v.toFixed(dec===undefined?1:dec); }
function escapeHtml(s){ return (s===undefined||s===null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

/* ---------------- events ---------------- */
function confirmDiscardIfDirty(){
  if(!state.carnetDirty) return true;
  return confirm('Des modifications de ce jour ne sont pas enregistrées. Les abandonner et continuer ?');
}
function bindEvents(){
  const stationSelect = document.getElementById('stationSelect');
  if(stationSelect) stationSelect.onchange = async (e)=>{
    if(!confirmDiscardIfDirty()){ render(); return; }
    state.currentStationId = e.target.value; await refreshForStation(); render();
  };

  const addBtns = document.querySelectorAll('#addStationBtn, #addStationBtnEmpty, #addStationBtn2');
  addBtns.forEach(b=> b.onclick = openAddStation);

  document.querySelectorAll('[data-tab]').forEach(t=> t.onclick = async ()=>{
    state.view = t.dataset.tab;
    if(state.view==='stations') state.archivedStations = await loadArchivedStations();
    if(state.view==='utilisateurs') state.usersList = await loadUsers();
    render();
  });

  const logoutBtn = document.getElementById('logoutBtn');
  if(logoutBtn) logoutBtn.onclick = logout;
  const togglePaperViewBtn = document.getElementById('togglePaperViewBtn');
  if(togglePaperViewBtn) togglePaperViewBtn.onclick = ()=>{ state.paperView = !state.paperView; render(); };
  const toggleMensuelPaperBtn = document.getElementById('toggleMensuelPaperBtn');
  if(toggleMensuelPaperBtn) toggleMensuelPaperBtn.onclick = ()=>{ state.mensuelPaperView = !state.mensuelPaperView; render(); };
  async function patchMonthlyDay(date, mutateFn){
    let rec = state.mensuelData.byDate[date];
    if(!rec){ rec = emptyCarnet(state.currentStationId, date); state.mensuelData.byDate[date] = rec; }
    mutateFn(rec);
    const ok = await saveCarnetRecord(rec);
    if(!ok){ toast('Échec de la sauvegarde — vérifiez la connexion.', true); return; }
    const prevDominant = state.mensuelData.dominantText;
    const records = await listCarnetForMonth(state.currentStationId, state.mensuelYear, state.mensuelMonth);
    const computed = computeMonthly(records, state.mensuelYear, state.mensuelMonth, null);
    computed.dominantText = prevDominant;
    state.mensuelData = computed;
    state.mensuelPaperView = true;
    render();
  }
  document.querySelectorAll('.monthly-hour-input').forEach(inp=> inp.addEventListener('change', (e)=>{
    const {mDate, mHour, mField} = e.target.dataset;
    patchMonthlyDay(mDate, rec=>{ rec.hours[mHour][mField] = e.target.value; });
  }));
  document.querySelectorAll('.monthly-extra-input').forEach(inp=> inp.addEventListener('change', (e)=>{
    const {mDate, mExtra} = e.target.dataset;
    patchMonthlyDay(mDate, rec=>{ rec.extras[mExtra] = e.target.value; });
  }));
  const printPaperBtn = document.getElementById('printPaperBtn');
  if(printPaperBtn) printPaperBtn.onclick = ()=> window.print();

  const addUserBtn = document.getElementById('addUserBtn');
  if(addUserBtn) addUserBtn.onclick = async ()=>{
    const fullName = document.getElementById('newUserFullName').value.trim();
    const username = document.getElementById('newUserUsername').value.trim();
    const password = document.getElementById('newUserPassword').value;
    const role = document.getElementById('newUserRole').value;
    const stationId = document.getElementById('newUserStation').value;
    if(!username || !password){ toast('Identifiant et mot de passe requis.', true); return; }
    if(role==='observateur' && !stationId){ toast('Choisissez une station pour ce compte observateur.', true); return; }
    const {ok, data} = await createUserApi({username, password, role, stationId, fullName});
    if(ok){ toast('Compte créé.'); state.usersList = await loadUsers(); render(); }
    else toast(data.error || 'Échec de la création.', true);
  };
  document.querySelectorAll('[data-del-user]').forEach(b=> b.onclick = async ()=>{
    if(!confirm('Supprimer ce compte ?')) return;
    const ok = await deleteUserApi(b.dataset.delUser);
    if(ok){ toast('Compte supprimé.'); state.usersList = await loadUsers(); render(); }
    else toast('Échec de la suppression.', true);
  });

  document.querySelectorAll('[data-archive-station]').forEach(b=> b.onclick = async ()=>{
    if(!confirm('Archiver cette station ? Elle disparaît de la liste active mais rien n\u2019est supprimé — vous pourrez la réactiver.')) return;
    const ok = await archiveStationApi(b.dataset.archiveStation);
    if(ok){
      state.stations = state.stations.filter(s=>s.id!==b.dataset.archiveStation);
      if(state.currentStationId===b.dataset.archiveStation) state.currentStationId = state.stations[0]?.id || null;
      state.archivedStations = await loadArchivedStations();
      await refreshForStation();
    } else toast('Échec de l\u2019archivage.', true);
    render();
  });
  document.querySelectorAll('[data-restore-station]').forEach(b=> b.onclick = async ()=>{
    const ok = await restoreStationApi(b.dataset.restoreStation);
    if(ok){
      state.stations = await loadStations();
      state.archivedStations = await loadArchivedStations();
      if(!state.currentStationId) state.currentStationId = state.stations[0]?.id || null;
      await refreshForStation();
      toast('Station réactivée.');
    } else toast('Échec de la réactivation.', true);
    render();
  });

  document.querySelectorAll('details.section').forEach(d=>{
    d.addEventListener('toggle', ()=>{
      const id = d.dataset.section;
      if(d.open) state.openSections.add(id); else state.openSections.delete(id);
    });
  });

  const carnetDateInput = document.getElementById('carnetDate');
  if(carnetDateInput) carnetDateInput.onchange = async (e)=>{
    if(!confirmDiscardIfDirty()){ render(); return; }
    state.carnetDate = e.target.value; await loadCarnetForCurrent(); render();
  };

  document.querySelectorAll('[data-mode]').forEach(b=> b.onclick = ()=>{ state.carnetMode = b.dataset.mode; render(); });
  document.querySelectorAll('[data-jump]').forEach(p=> p.onclick = async ()=>{
    if(!confirmDiscardIfDirty()){ return; }
    state.carnetDate = p.dataset.jump; await loadCarnetForCurrent(); render();
  });

  document.querySelectorAll('[data-hour]').forEach(inp=> inp.onchange = (e)=>{
    const h = e.target.dataset.hour, f = e.target.dataset.field;
    if(!f) return; // champs gérés séparément (ex: mini-champs du triplet N5C5h5)
    state.carnetRecord.hours[h][f] = e.target.value;
    state.carnetDirty = true; updateSaveIndicator();
    if(f==='visibiliteDam' && !state.carnetRecord.hours[h].visibiliteCode){
      const dam = toNum(e.target.value);
      if(dam!==null){
        const km = dam*10/1000;
        const code = nearestVisibiliteCode(km);
        if(code){
          state.carnetRecord.hours[h].visibiliteCode = code;
          patchHourInput(h, 'visibiliteCode', code);
        }
      }
    }
    if(f==='N' || f==='CL' || f==='CM' || f==='CH'){
      state.carnetRecord.hours[h].groupeNhClCmCh = computeCloudGroup(state.carnetRecord.hours[h]);
      patchHourInput(h, 'groupeNhClCmCh', state.carnetRecord.hours[h].groupeNhClCmCh);
    }
    if(f==='Tsec' || f==='Tw' || f==='humidite'){
      const hourObj = state.carnetRecord.hours[h];
      const changed = autoComputeHygro(hourObj, toNum(hourObj.pressionLue));
      if(changed){
        patchHourInput(h, 'tensionVapeur', hourObj.tensionVapeur);
        patchHourInput(h, 'humidite', hourObj.humidite);
        patchHourInput(h, 'pointRosee', hourObj.pointRosee);
      }
    }
    if(f==='pressionLue' || f==='Tsec'){
      const station = state.stations.find(s=>s.id===state.currentStationId);
      const alt = station ? toNum(station.alt) : null;
      const hourObj = state.carnetRecord.hours[h];
      const pression = toNum(hourObj.pressionLue), tsec = toNum(hourObj.Tsec);
      if(alt!==null && pression!==null && tsec!==null){
        const mer = reducePressureToSeaLevel(pression, alt, tsec);
        if(mer!==null){
          hourObj.niveauMerPression = mer.toFixed(1);
          patchHourInput(h, 'niveauMerPression', hourObj.niveauMerPression);
        }
      }
    }
  });
  attachComboHints();
  document.querySelectorAll('.triplet-part').forEach(inp=> inp.onchange = (e)=>{
    const h = e.target.dataset.hour;
    const field = e.target.dataset.tripletField;
    const cell = e.target.closest('td.triplet-cell');
    const n = cell.querySelector('[data-triplet-part="n"]').value;
    const c = cell.querySelector('[data-triplet-part="c"]').value;
    const hh = cell.querySelector('[data-triplet-part="h"]').value;
    state.carnetRecord.hours[h][field] = composeTripletCode(n, c, hh);
    state.carnetDirty = true; updateSaveIndicator();
  });
  function applyParsedCloudCodes(h, showFeedback){
    const text = state.carnetRecord.hours[h].nuagesDesc || '';
    const parsed = parseCloudCodesFromText(text);
    if(!parsed.length){
      if(showFeedback) toast('Aucune abréviation OMM reconnue dans ce texte — ex. "Cu con 3/8 600m".', true);
      return;
    }
    let filled = 0;
    parsed.forEach((sug, i)=>{
      const field = `groupeNuages${i+1}`;
      if((state.carnetRecord.hours[h][field]||'').trim()) return; // ne jamais écraser une saisie deja faite
      state.carnetRecord.hours[h][field] = composeTripletCode(sug.n, sug.c, sug.h);
      filled++;
    });
    if(filled){ state.carnetDirty = true; updateSaveIndicator(); render(); }
    if(showFeedback) toast(filled ? `${filled} colonne(s) rempliee(s) à partir du texte.` : "Rien à faire : les colonnes concernées étaient déjà remplies.");
  }
  document.querySelectorAll('[data-suggest-clouds]').forEach(b=> b.onclick = ()=> applyParsedCloudCodes(b.dataset.suggestClouds, true));
  document.querySelectorAll('.nuages-desc-input').forEach(inp=> inp.addEventListener('blur', ()=> applyParsedCloudCodes(inp.dataset.hour, false)));
  document.querySelectorAll('[data-extra]').forEach(inp=> inp.onchange = (e)=>{
    state.carnetRecord.extras[e.target.dataset.extra] = e.target.value;
    state.carnetDirty = true; updateSaveIndicator();
  });
  document.querySelectorAll('[data-phen]').forEach(inp=> inp.onchange = (e)=>{
    state.carnetRecord.extras[e.target.dataset.phen] = e.target.checked;
    state.carnetDirty = true; updateSaveIndicator();
  });
  const phen = document.getElementById('phenomenesRemarquables');
  if(phen) phen.onchange = (e)=>{ state.carnetRecord.extras.phenomenesRemarquables = e.target.value; state.carnetDirty = true; updateSaveIndicator(); };
  const resumeInput = document.getElementById('resumeTempsClair');
  if(resumeInput) resumeInput.onchange = (e)=>{ state.carnetRecord.extras.resumeTempsClair = e.target.value; state.carnetDirty = true; updateSaveIndicator(); };
  const genDayResumeBtn = document.getElementById('genDayResumeBtn');
  if(genDayResumeBtn) genDayResumeBtn.onclick = ()=>{ state.carnetRecord.extras.resumeTempsClair = dailyResume(state.carnetRecord); state.carnetDirty = true; render(); };

  document.querySelectorAll('[data-add-event]').forEach(b=> b.onclick = ()=>{
    const arr = b.dataset.addEvent;
    const fields = arr==='grainsOrages' ? GRAIN_FIELDS : OBS_SPECIALE_FIELDS;
    const obj = {id: uid()}; fields.forEach(f=> obj[f.k]='');
    state.carnetRecord[arr].push(obj);
    state.carnetDirty = true;
    render();
  });
  document.querySelectorAll('[data-del-event]').forEach(b=> b.onclick = ()=>{
    const arr = b.dataset.delArray; const idx = parseInt(b.dataset.delEvent);
    state.carnetRecord[arr].splice(idx,1);
    state.carnetDirty = true;
    render();
  });
  document.querySelectorAll('[data-event-field]').forEach(inp=> inp.onchange = (e)=>{
    const arr = e.target.dataset.eventArray; const idx = parseInt(e.target.dataset.eventIdx); const f = e.target.dataset.eventField;
    state.carnetRecord[arr][idx][f] = e.target.value;
    state.carnetDirty = true; updateSaveIndicator();
  });

  const saveCarnetBtn = document.getElementById('saveCarnetBtn');
  if(saveCarnetBtn) saveCarnetBtn.onclick = async ()=>{
    saveCarnetBtn.disabled = true; const prevLabel = saveCarnetBtn.textContent; saveCarnetBtn.innerHTML = '<span class="spinner"></span> Localisation…';
    await saveCurrentDay('Jour enregistré.', 'day');
    saveCarnetBtn.disabled = false; saveCarnetBtn.textContent = prevLabel;
  };
  const saveRapideBtn = document.getElementById('saveRapideBtn');
  if(saveRapideBtn) saveRapideBtn.onclick = async ()=>{
    saveRapideBtn.disabled = true; const prevLabel = saveRapideBtn.textContent; saveRapideBtn.innerHTML = '<span class="spinner"></span> Localisation…';
    await saveCurrentDay(`${state.rapideHour}h enregistrée.`, 'hour');
    saveRapideBtn.disabled = false; saveRapideBtn.textContent = prevLabel;
  };

  document.querySelectorAll('[data-jump-hour]').forEach(p=> p.onclick = ()=>{ state.rapideHour = p.dataset.jumpHour; render(); });
  const toggleAdvancedBtn = document.getElementById('toggleAdvancedBtn');
  if(toggleAdvancedBtn) toggleAdvancedBtn.onclick = ()=>{ state.rapideShowAdvanced = !state.rapideShowAdvanced; render(); };
  const gotoCarnet = document.querySelector('[data-goto-carnet]');
  if(gotoCarnet) gotoCarnet.onclick = (e)=>{ e.preventDefault(); state.view='carnet'; render(); };

  const scanInput = document.getElementById('scanInput');
  if(scanInput) scanInput.onchange = (e)=>{ state.scanFiles = state.scanFiles.concat(Array.from(e.target.files)); renderThumbs(); };
  const scanDrop = document.getElementById('scanDrop');
  if(scanDrop){
    scanDrop.ondragover = (e)=>{ e.preventDefault(); scanDrop.classList.add('drag'); };
    scanDrop.ondragleave = ()=> scanDrop.classList.remove('drag');
    scanDrop.ondrop = (e)=>{ e.preventDefault(); scanDrop.classList.remove('drag'); state.scanFiles = state.scanFiles.concat(Array.from(e.dataTransfer.files)); renderThumbs(); };
  }
  const analyzeBtn = document.getElementById('analyzeBtn');
  if(analyzeBtn) analyzeBtn.onclick = analyzeScan;
  const clearScanBtn = document.getElementById('clearScanBtn');
  if(clearScanBtn) clearScanBtn.onclick = ()=>{ state.scanFiles=[]; renderThumbs(); };
  renderThumbs();

  const mMonth = document.getElementById('mensuelMonth');
  if(mMonth) mMonth.onchange = async (e)=>{ state.mensuelMonth = parseInt(e.target.value); await loadMensuelForCurrent(); render(); };
  const mYear = document.getElementById('mensuelYear');
  if(mYear) mYear.onchange = async (e)=>{ state.mensuelYear = parseInt(e.target.value); await loadMensuelForCurrent(); render(); };

  const genBtn = document.getElementById('genFromCarnetBtn');
  if(genBtn) genBtn.onclick = async ()=>{
    state.mensuelComputing = true; render();
    const station = state.stations.find(s=>s.id===state.currentStationId);
    const records = await listCarnetForMonth(station.id, state.mensuelYear, state.mensuelMonth);
    const existing = {}; if(state.mensuelData) state.mensuelData.days.forEach(d=> existing[d.date]=d);
    const computed = computeMonthly(records, state.mensuelYear, state.mensuelMonth, records.length? null : existing);
    computed.dominantText = null;
    state.mensuelData = computed;
    state.mensuelComputing = false;
    toast(`${records.length} jour(s) relu(s) depuis le carnet.`);
    render();
  };
  const genResumesBtn = document.getElementById('genResumesBtn');
  if(genResumesBtn) genResumesBtn.onclick = async ()=>{
    if(!state.mensuelData) return;
    const station = state.stations.find(s=>s.id===state.currentStationId);
    const records = await listCarnetForMonth(station.id, state.mensuelYear, state.mensuelMonth);
    const byDate = {}; records.forEach(r=> byDate[r.date]=r);
    state.mensuelData.days.forEach(d=>{ if(byDate[d.date]) d.resumeTempsClair = dailyResume(byDate[d.date]); });
    state.mensuelData.dominantText = null;
    render();
    toast('Résumés régénérés.');
  };
  document.querySelectorAll('[data-day]').forEach(inp=> inp.onchange = (e)=>{
    state.mensuelData.days[parseInt(e.target.dataset.day)][e.target.dataset.dfield] = e.target.value;
  });
  const domText = document.getElementById('dominantText');
  if(domText) domText.onchange = (e)=>{ state.mensuelData.dominantText = e.target.value; };

  const saveMensuelBtn = document.getElementById('saveMensuelBtn');
  if(saveMensuelBtn) saveMensuelBtn.onclick = async ()=>{
    const station = state.stations.find(s=>s.id===state.currentStationId);
    const payload = { stationId: station.id, year: state.mensuelYear, month: state.mensuelMonth, days: state.mensuelData.days, dominantText: state.mensuelData.dominantText };
    const ok = await saveMensuel(payload);
    toast(ok? 'Tableau mensuel enregistré.' : 'Échec de l\u2019enregistrement.', !ok);
  };
  const exportBtn = document.getElementById('exportMensuelBtn');
  if(exportBtn) exportBtn.onclick = ()=>{
    const station = state.stations.find(s=>s.id===state.currentStationId);
    const summary = summarize(state.mensuelData);
    const blob = new Blob([JSON.stringify({station: station.name, year: state.mensuelYear, month: state.mensuelMonth, days: state.mensuelData.days, summary}, null, 2)], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `tableau-climatologique-${station.id}-${state.mensuelYear}-${pad2(state.mensuelMonth)}.json`;
    a.click();
  };

  const draftName = document.getElementById('draftName');
  if(draftName){ draftName.oninput = (e)=>{ state.stationDraft.name = e.target.value; }; draftName.focus(); }
  const draftLat = document.getElementById('draftLat'); if(draftLat) draftLat.oninput = (e)=>{ state.stationDraft.lat = e.target.value; };
  const draftLon = document.getElementById('draftLon'); if(draftLon) draftLon.oninput = (e)=>{ state.stationDraft.lon = e.target.value; };
  const draftAlt = document.getElementById('draftAlt'); if(draftAlt) draftAlt.oninput = (e)=>{ state.stationDraft.alt = e.target.value; };
  const cancelStationBtn = document.getElementById('cancelStationBtn'); if(cancelStationBtn) cancelStationBtn.onclick = closeStationModal;
  const confirmStationBtn = document.getElementById('confirmStationBtn'); if(confirmStationBtn) confirmStationBtn.onclick = confirmAddStation;
  const overlay = document.getElementById('stationModalOverlay');
  if(overlay) overlay.onclick = (e)=>{ if(e.target===overlay) closeStationModal(); };

  const exportBackupBtn = document.getElementById('exportBackupBtn');
  if(exportBackupBtn) exportBackupBtn.onclick = exportFullBackup;
  const importBackupInput = document.getElementById('importBackupInput');
  if(importBackupInput) importBackupInput.onchange = (e)=>{ if(e.target.files[0]) importFullBackup(e.target.files[0]); };
}
function patchHourInput(hour, field, value){
  const el = document.querySelector(`input[data-hour="${hour}"][data-field="${field}"]`);
  if(el) el.value = value;
}
function attachComboHints(){
  document.querySelectorAll('input[data-combo]').forEach(inp=>{
    inp.addEventListener('focus', onComboFocusOrInput);
    inp.addEventListener('input', onComboFocusOrInput);
    inp.addEventListener('blur', onComboBlur);
  });
}
function onComboFocusOrInput(e){
  const inp = e.target;
  const table = COMBO_TABLES[inp.dataset.combo];
  const hint = document.getElementById('codeHint');
  if(!hint || !table) return;
  const v = inp.value.trim();
  if(!v){ hint.style.display='none'; return; }
  const match = table.find(([c])=> c.toLowerCase()===v.toLowerCase());
  hint.textContent = match ? `${match[0]} — ${match[1]}` : `« ${v} » — code inconnu dans cette table`;
  hint.classList.toggle('unknown', !match);
  const rect = inp.getBoundingClientRect();
  hint.style.left = Math.max(4, rect.left) + 'px';
  hint.style.top = (rect.bottom + 6) + 'px';
  hint.style.display = 'block';
}
function onComboBlur(){
  setTimeout(()=>{ const hint = document.getElementById('codeHint'); if(hint) hint.style.display='none'; }, 120);
}
function renderThumbs(){
  const row = document.getElementById('thumbRow'); if(!row) return;
  row.innerHTML = state.scanFiles.map((f,i)=>`<div style="position:relative;"><img class="thumb" src="${URL.createObjectURL(f)}"><button class="small-x" data-rmthumb="${i}" style="position:absolute;top:-6px;right:-6px;background:#fff;border-radius:50%;">✕</button></div>`).join('');
  row.querySelectorAll('[data-rmthumb]').forEach(b=> b.onclick = ()=>{ state.scanFiles.splice(parseInt(b.dataset.rmthumb),1); renderThumbs(); });
}

/* ---------------- station modal ---------------- */
function openAddStation(){
  state.stationDraft = {name:'', lat:'', lon:'', alt:''};
  state.stationModalOpen = true;
  render();
}
function closeStationModal(){ state.stationModalOpen = false; render(); }
async function confirmAddStation(){
  const d = state.stationDraft;
  if(!d.name.trim()){ toast('Le nom de la station est requis.', true); return; }
  const id = d.name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') + '-' + Date.now().toString(36).slice(-4);
  const st = {id, name: d.name.trim(), lat: d.lat.trim(), lon: d.lon.trim(), alt: d.alt.trim()};
  const ok = await addStationApi(st);
  if(!ok){ toast('Échec de la création — vérifiez que le serveur et la base de données sont bien démarrés.', true); return; }
  state.stations.push(st);
  state.currentStationId = id;
  state.stationModalOpen = false;
  await refreshForStation();
  render();
}
function renderStationModal(){
  const d = state.stationDraft;
  return `
  <div class="modal-overlay" id="stationModalOverlay">
    <div class="modal-card">
      <h3>Nouvelle station</h3>
      <div class="field"><label>Nom</label><input type="text" id="draftName" value="${escapeAttr(d.name)}" placeholder="Sotuba, Sikasso..." style="font-family:var(--font-sans);"></div>
      <div class="field"><label>Latitude</label><input type="text" id="draftLat" value="${escapeAttr(d.lat)}" placeholder="12°39'N"></div>
      <div class="field"><label>Longitude</label><input type="text" id="draftLon" value="${escapeAttr(d.lon)}" placeholder="7°56'W"></div>
      <div class="field"><label>Altitude (m)</label><input type="text" id="draftAlt" value="${escapeAttr(d.alt)}" placeholder="381"></div>
      <div class="modal-actions">
        <button class="btn" id="cancelStationBtn">Annuler</button>
        <button class="btn primary" id="confirmStationBtn">Ajouter la station</button>
      </div>
    </div>
  </div>`;
}

/* ---------------- load flows ---------------- */
async function loadCarnetForCurrent(){
  const station = state.stations.find(s=>s.id===state.currentStationId);
  if(!station) return;
  const existing = await loadCarnet(station.id, state.carnetDate);
  state.carnetRecord = existing ? withDefaults(existing, station.id, state.carnetDate) : emptyCarnet(station.id, state.carnetDate);
  state.carnetDirty = false;
  state.carnetLastSaved = null;
  const [y,m] = state.carnetDate.split('-');
  const records = await listCarnetForMonth(station.id, parseInt(y), parseInt(m));
  state.carnetSavedDays = records.map(r=>r.date);
}
async function loadMensuelForCurrent(){
  const station = state.stations.find(s=>s.id===state.currentStationId);
  if(!station) return;
  const saved = await loadMensuel(station.id, state.mensuelYear, state.mensuelMonth);
  if(saved){
    const records = await listCarnetForMonth(station.id, state.mensuelYear, state.mensuelMonth);
    const byDate = {}; records.forEach(r=> byDate[r.date]=r);
    const days = saved.days.map(d=>({...emptyDayAgg(d.date), ...d, _hasCarnet: !!byDate[d.date]}));
    days.forEach(d=>{ const dm = dayMeans(byDate[d.date]||null); d._humMoy=dm.humMoy; d._pressMoy=dm.pressMoy; d._nebMoy=dm.nebMoy; });
    state.mensuelData = { days, byDate, hourly: computeHourlyMeans(records), windFreq: computeWindFreq18(records), phenCounts: countPhenDays(records, byDate), intensiteRemarquable: computeIntensiteRemarquable(records), dominantText: saved.dominantText };
  } else {
    state.mensuelData = null;
  }
}
async function refreshForStation(){
  await loadCarnetForCurrent();
  await loadMensuelForCurrent();
}

/* ---------------- full backup / restore ---------------- */
async function exportFullBackup(){
  state.backupBusy = true; render();
  try{
    const backup = {exportedAt: new Date().toISOString(), stations: state.stations, data: {}};
    for(const st of state.stations){
      const carnetRecords = await listCarnetAll(st.id);
      const mensuelRecords = await listMensuelAll(st.id);
      backup.data[st.id] = {carnet: carnetRecords, mensuel: mensuelRecords};
    }
    const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `meteocarnet-sauvegarde-complete-${todayStr()}.json`;
    a.click();
    toast('Sauvegarde complète téléchargée.');
  }catch(e){
    console.error(e); toast('Échec de la sauvegarde complète.', true);
  }
  state.backupBusy = false; render();
}
async function importFullBackup(file){
  try{
    const text = await file.text();
    const backup = JSON.parse(text);
    if(!backup || !backup.data){ toast('Fichier de sauvegarde invalide.', true); return; }
    if(!confirm('Restaurer cette sauvegarde va réécrire les jours et tableaux mensuels portant les mêmes identifiants (le reste est conservé). Continuer ?')) return;
    const existingIds = new Set(state.stations.map(s=>s.id));
    for(const s of (backup.stations||[])){
      if(!existingIds.has(s.id)){ await addStationApi(s); state.stations.push(s); existingIds.add(s.id); }
    }
    for(const stId in backup.data){
      const d = backup.data[stId];
      for(const rec of (d.carnet||[])){
        await apiFetch(`/api/carnet/${encodeURIComponent(stId)}/${rec.date}`, {
          method:'PUT', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({hours: rec.hours, extras: rec.extras, grainsOrages: rec.grainsOrages, observationsSpeciales: rec.observationsSpeciales})
        });
      }
      for(const rec of (d.mensuel||[])){
        await apiFetch(`/api/mensuel/${encodeURIComponent(stId)}/${rec.year}/${rec.month}`, {
          method:'PUT', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({days: rec.days, dominantText: rec.dominantText})
        });
      }
    }
    toast('Sauvegarde restaurée.');
    await refreshForStation();
    render();
  }catch(e){
    console.error(e); toast('Fichier de sauvegarde invalide ou illisible.', true);
  }
}

/* ---------------- boot ---------------- */
window.addEventListener('beforeunload', (e)=>{
  if(state.carnetDirty){ e.preventDefault(); e.returnValue = ''; return ''; }
});
async function bootAfterLogin(){
  document.getElementById('datalists').innerHTML = renderDatalists();
  state.stations = await loadStations();
  state.archivedStations = await loadArchivedStations();
  if(state.stations.length) state.currentStationId = state.stations[0].id;
  await refreshForStation();
  render();
}
(async function init(){
  try{
    const r = await fetch('/api/auth/me');
    if(r.ok){
      state.currentUser = await r.json();
      await bootAfterLogin();
      return;
    }
  }catch(e){}
  render();
})();
</script>
</body>
